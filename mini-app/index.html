<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>izEscrowAI — AI-Powered P2P Escrow on TON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/2.0.0/iconify-icon.min.js"></script>
    <style>
      :root {
        --ton-blue: #0098EA;
        --dark-bg: #0f0f1a;
      }
      .ton-gradient {
        background: linear-gradient(135deg, #0098EA 0%, #0076b6 100%);
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glow-blue {
        box-shadow: 0 0 40px rgba(0, 152, 234, 0.15);
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      .deal-bubble {
        position: relative;
        background: rgba(0, 152, 234, 0.1);
        border: 1px solid rgba(0, 152, 234, 0.2);
        border-radius: 1.5rem 1.5rem 1.5rem 0.2rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
